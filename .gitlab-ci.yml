# ---------------- TEST STAGE ----------------
unit-tests:
  stage: test
  image: golang:1.26
  script:
    # Run tests and generate coverage report
    - go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
  artifacts:
    expire_in: 1 day
    paths:
      - coverage.out
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------- SonarQube: Quality Gate Stage ----------------
sonarqube-check:
  stage: quality-gate
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all branches and history, required for proper Sonar blame features
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: false
